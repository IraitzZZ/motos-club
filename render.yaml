services:
  - type: web
    name: motosclub
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: motosclub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: IMGBB_API_KEY
        value: 27a447d71db292f6c1296f509a06b09e

databases:
  - name: motosclub-db
    plan: free
